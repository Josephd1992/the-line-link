<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gold Line Link - Record</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { max-width: 500px; width: 100%; padding-bottom: 80px; }
        h1 { color: #fbbf24; text-align: center; font-size: 1.5rem; margin-bottom: 30px; }
        
        .prompt-card { background: #111; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .prompt-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: #f1f5f9; line-height: 1.4; }
        
        textarea { width: 100%; background: #000; border: 1px solid #334155; border-radius: 8px; color: white; padding: 12px; font-size: 1rem; margin-top: 10px; resize: none; box-sizing: border-box; }
        
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .rec-btn, .stop-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        
        .rec-btn { background: #fbbf24; color: #000; }
        .stop-btn { background: #ef4444; color: white; display: none; }
        
        .submit-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #22c55e; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; box-shadow: 0 4px 20px rgba(0,0,0,0.5); cursor: pointer; }
        #status { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="headerTitle">Send Appreciation</h1>
    
    <div class="prompt-card">
        <div class="prompt-title" id="title-1">Loading prompt...</div>
        <div class="controls">
            <button class="rec-btn" id="btn-rec-1" onclick="startRec(1)">Record Voice</button>
            <button class="stop-btn" id="btn-stop-1" onclick="stopRec(1)">Stop (0s)</button>
        </div>
        <textarea id="text-1" rows="3" placeholder="Or type your message here..."></textarea>
    </div>

    <div class="prompt-card">
        <div class="prompt-title" id="title-2">Loading prompt...</div>
        <div class="controls">
            <button class="rec-btn" id="btn-rec-2" onclick="startRec(2)">Record Voice</button>
            <button class="stop-btn" id="btn-stop-2" onclick="stopRec(2)">Stop (0s)</button>
        </div>
        <textarea id="text-2" rows="3" placeholder="Or type your message here..."></textarea>
    </div>

    <div class="prompt-card">
        <div class="prompt-title" id="title-3">Anything else you'd like to say?</div>
        <div class="controls">
            <button class="rec-btn" id="btn-rec-3" onclick="startRec(3)">Record Voice</button>
            <button class="stop-btn" id="btn-stop-3" onclick="stopRec(3)">Stop (0s)</button>
        </div>
        <textarea id="text-3" rows="3" placeholder="Or type your message here..."></textarea>
    </div>

    <div id="status"></div>
    <button class="submit-btn" onclick="finalSubmit()">SEND TO GALLERY</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4-eypucZ9FjS4sk4CQgkeNMPyyh4HvcU",
        authDomain: "the-line-link.firebaseapp.com",
        projectId: "the-line-link",
        storageBucket: "the-line-link.firebasestorage.app",
        messagingSenderId: "378236622341",
        appId: "1:378236622341:web:6809e3cd491a7e945b2e6c",
        measurementId: "G-KHPWDYHQRF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // --- Agency & Prompt Logic ---
    const params = new URLSearchParams(window.location.search);
    const selectedAgency = params.get('agency') || 'CITIZEN';

    const promptMap = {
        'LEO': ["What’s a call where a dispatcher's calm voice made the difference?", "What’s one thing you want dispatchers to know about life on the street?"],
        'FIRE': ["Tell us about a time dispatch helped you coordinate a complex scene.", "What’s a message of support for the 'Voice behind the Radio'?"],
        'EMS': ["How have pre-arrival instructions helped you on a medical call?", "What does a professional dispatcher mean to you as a medic?"],
        'CITIZEN': ["Tell a story of a time you called 911 and felt supported.", "What would you like to say to the person who answers when Roswell calls?"]
    };

    const agencyCleanName = { 'LEO': 'Law Enforcement', 'FIRE': 'Fire / Rescue', 'EMS': 'EMS / Medical', 'CITIZEN': 'The Community' };

    document.getElementById('headerTitle').innerText = `Appreciation from ${agencyCleanName[selectedAgency]}`;
    document.getElementById('title-1').innerText = promptMap[selectedAgency][0];
    document.getElementById('title-2').innerText = promptMap[selectedAgency][1];

    // --- Recording Logic ---
    let mediaRecorder;
    let audioChunks = [];
    let elapsedTimer;
    const audioBlobs = {};

    window.startRec = async (id) => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                clearInterval(elapsedTimer);
                audioBlobs[id] = new Blob(audioChunks, { type: 'audio/webm' });
                document.getElementById(`btn-stop-${id}`).style.display = 'none';
                const recBtn = document.getElementById(`btn-rec-${id}`);
                recBtn.style.display = 'block';
                recBtn.innerText = "Redo Recording";
            };

            mediaRecorder.start();
            document.getElementById(`btn-rec-${id}`).style.display = 'none';
            const stopBtn = document.getElementById(`btn-stop-${id}`);
            stopBtn.style.display = 'block';
            
            let seconds = 0;
            stopBtn.innerText = `Stop (0s)`;
            elapsedTimer = setInterval(() => {
                seconds++;
                stopBtn.innerText = `Stop (${seconds}s)`;
            }, 1000);

        } catch(e) { alert("Microphone access is required."); }
    };

    window.stopRec = (id) => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        }
    };

    // --- Submit Logic ---
    window.finalSubmit = async () => {
        const status = document.getElementById('status');
        status.innerText = "Submitting to the Gold Line...";
        
        try {
            let hasContent = false;
            for (let i = 1; i <= 3; i++) {
                const note = document.getElementById(`text-${i}`).value.trim();
                const audio = audioBlobs[i];
                
                if (audio || note !== "") {
                    hasContent = true;
                    let url = "";
                    if (audio) {
                        const fileRef = ref(storage, `audios/${Date.now()}_${i}.webm`);
                        const snap = await uploadBytes(fileRef, audio);
                        url = await getDownloadURL(snap.ref);
                    }
                    await addDoc(collection(db, "messages"), {
                        agency: selectedAgency,
                        prompt: i === 3 ? "Freestyle" : promptMap[selectedAgency][i-1],
                        audioUrl: url,
                        textNote: note,
                        approved: false,
                        timestamp: serverTimestamp()
                    });
                }
            }
            
            if(!hasContent) {
                status.innerText = "";
                return alert("Please record or type something first!");
            }

            alert("Success! Sent to the gallery review queue.");
            window.location.href = "index.html";
        } catch(e) { 
            console.error(e);
            alert("Error saving. Please check your connection."); 
            status.innerText = "";
        }
    };
</script>
</body>
</html>
