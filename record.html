<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gold Line Link - Record</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { max-width: 500px; width: 100%; padding-bottom: 50px; }
        h1 { color: #fbbf24; text-align: center; margin-bottom: 10px; }
        .sub-text { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }
        .back-nav { text-align: center; margin-bottom: 20px; }
        .back-btn { color: #fbbf24; text-decoration: none; font-weight: bold; border: 1px solid #fbbf24; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; }
        .section-label { font-size: 0.8rem; text-transform: uppercase; color: #fbbf24; letter-spacing: 1px; margin: 20px 0 10px; font-weight: bold; }
        .agency-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .agency-btn { padding: 12px; border: 1px solid #334155; border-radius: 8px; background: #111; color: #94a3b8; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .agency-btn.active { border-color: #fbbf24; color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .prompt-card { background: #111; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .prompt-card.recorded { border-color: #22c55e; }
        .prompt-title { font-weight: bold; margin-bottom: 12px; font-size: 1rem; color: #e2e8f0; }
        .controls { display: flex; gap: 10px; margin-bottom: 12px; }
        .rec-btn { flex: 2; padding: 12px; border-radius: 8px; border: none; font-weight: bold; background: #fbbf24; color: #000; }
        .stop-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; background: #ef4444; color: white; display: none; }
        .preview-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; background: #475569; color: white; display: none; }
        .prompt-textarea { width: 100%; background: #000; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: white; font-family: inherit; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 20px; border-radius: 12px; border: none; background: #fbbf24; color: #000; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { text-align: center; margin-top: 15px; color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="back-nav"><a href="index.html" class="back-btn">← BACK</a></div>
    <h1>The Gold Line Link</h1>
    <p class="sub-text">Speak or type your appreciation below.</p>
    <div class="section-label">1. Who is sending this?</div>
    <div class="agency-picker">
        <button class="agency-btn" data-type="LEO">LAW ENFORCEMENT</button>
        <button class="agency-btn" data-type="FIRE">FIRE / RESCUE</button>
        <button class="agency-btn" data-type="EMS">EMS / MEDICAL</button>
        <button class="agency-btn" data-type="CITIZEN">COMMUNITY</button>
    </div>
    <div class="section-label">2. Your Message</div>
    <div class="prompt-card" id="card-1">
        <div class="prompt-title">What would you like to say to the dispatchers who answer your calls?</div>
        <div class="controls">
            <button class="rec-btn" id="btn-rec-1" onclick="startRec(1)">Record Voice</button>
            <button class="stop-btn" id="btn-stop-1" onclick="stopRec(1)">Stop</button>
            <button class="preview-btn" id="btn-prev-1" onclick="playPrev(1)">Preview</button>
        </div>
        <textarea class="prompt-textarea" id="text-1" rows="3" placeholder="...or type here"></textarea>
    </div>
    <div class="prompt-card" id="card-2">
        <div class="prompt-title">Share a story of how a dispatcher helped you during an emergency.</div>
        <div class="controls">
            <button class="rec-btn" id="btn-rec-2" onclick="startRec(2)">Record Voice</button>
            <button class="stop-btn" id="btn-stop-2" onclick="stopRec(2)">Stop</button>
            <button class="preview-btn" id="btn-prev-2" onclick="playPrev(2)">Preview</button>
        </div>
        <textarea class="prompt-textarea" id="text-2" rows="3" placeholder="...or type here"></textarea>
    </div>
    <button class="submit-btn" id="submitAll" onclick="finalSubmit()">Submit to the Link</button>
    <div id="status">Ready...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4-eypucZ9FjS4sk4CQgkeNMPyyh4HvcU",
        authDomain: "the-line-link.firebaseapp.com",
        projectId: "the-line-link",
        storageBucket: "the-line-link.firebasestorage.app",
        messagingSenderId: "378236622341",
        appId: "1:378236622341:web:6809e3cd491a7e945b2e6c",
        measurementId: "G-KHPWDYHQRF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let mediaRecorder;
    let audioChunks = [];
    let selectedAgency = "";
    const audioBlobs = {}; 

    document.querySelectorAll('.agency-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.agency-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedAgency = btn.getAttribute('data-type');
        };
    });

    window.startRec = async (id) => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            audioBlobs[id] = new Blob(audioChunks, { type: 'audio/webm' });
            document.getElementById(`btn-prev-${id}`).style.display = 'block';
            document.getElementById(`card-${id}`).classList.add('recorded');
        };
        mediaRecorder.start();
        document.getElementById(`btn-rec-${id}`).style.display = 'none';
        document.getElementById(`btn-stop-${id}`).style.display = 'block';
    };

    window.stopRec = (id) => {
        mediaRecorder.stop();
        document.getElementById(`btn-stop-${id}`).style.display = 'none';
        document.getElementById(`btn-rec-${id}`).style.display = 'block';
    };

    window.playPrev = (id) => {
        if (audioBlobs[id]) {
            const audioUrl = URL.createObjectURL(audioBlobs[id]);
            new Audio(audioUrl).play();
        }
    };

    window.finalSubmit = async () => {
        if (!selectedAgency) return alert("Select agency first!");
        const status = document.getElementById('status');
        status.innerText = "Sending...";
        try {
            for (let i = 1; i <= 2; i++) {
                const note = document.getElementById(`text-${i}`).value.trim();
                const audio = audioBlobs[i];
                if (audio || note !== "") {
                    let url = "";
                    if (audio) {
                        const fileName = `voice_${Date.now()}_${i}.webm`;
                        const storageRef = ref(storage, 'audios/' + fileName);
                        const snapshot = await uploadBytes(storageRef, audio);
                        url = await getDownloadURL(snapshot.ref);
                    }
                    await addDoc(collection(db, "messages"), {
                        agency: selectedAgency,
                        prompt: document.querySelector(`#card-${i} .prompt-title`).innerText,
                        audioUrl: url,
                        textNote: note,
                        approved: false,
                        timestamp: serverTimestamp()
                    });
                }
            }
            alert("Success! Review pending.");
            window.location.href = "index.html";
        } catch (e) {
            status.innerText = "Error. Try again.";
        }
    };
</script>
</body>
</html>
