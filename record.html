<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Line Link - Record</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { max-width: 400px; width: 90%; background: #1e293b; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        button { width: 100%; padding: 18px; margin: 10px 0; font-size: 1.1rem; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; transition: 0.2s; }
        #recordBtn { background: #ef4444; color: white; }
        #stopBtn { background: #f97316; color: white; display: none; }
        #previewArea { display: none; margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; }
        audio { width: 100%; margin-bottom: 15px; }
        #sendBtn { background: #22c55e; color: white; }
        #redoBtn { background: #64748b; color: white; }
        .status { margin-top: 20px; color: #fbbf24; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h1>The Line Link</h1>
    <p id="instruction">Share a word for the next shift.</p>
    
    <button id="recordBtn">Start Recording</button>
    <button id="stopBtn">Stop Recording</button>

    <div id="previewArea">
        <p>Review your message:</p>
        <audio id="audioPreview" controls></audio>
        <button id="sendBtn">Send to the Link</button>
        <button id="redoBtn">Delete & Redo</button>
    </div>

    <div id="status" class="status">Ready...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4-eypucZ9FjS4sk4CQgkeNMPyyh4HvcU",
        authDomain: "the-line-link.firebaseapp.com",
        projectId: "the-line-link",
        storageBucket: "the-line-link.firebasestorage.app",
        messagingSenderId: "378236622341",
        appId: "1:378236622341:web:6809e3cd491a7e945b2e6c",
        measurementId: "G-KHPWDYHQRF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let mediaRecorder;
    let audioChunks = [];
    let audioBlob;

    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const previewArea = document.getElementById('previewArea');
    const audioPreview = document.getElementById('audioPreview');
    const sendBtn = document.getElementById('sendBtn');
    const redoBtn = document.getElementById('redoBtn');
    const status = document.getElementById('status');

    recordBtn.onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const audioUrl = URL.createObjectURL(audioBlob);
            audioPreview.src = audioUrl;
            previewArea.style.display = 'block';
            status.innerText = "Preview your message above.";
        };

        mediaRecorder.start();
        recordBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        status.innerText = "Recording...";
    };

    stopBtn.onclick = () => {
        mediaRecorder.stop();
        stopBtn.style.display = 'none';
    };

    redoBtn.onclick = () => {
        previewArea.style.display = 'none';
        recordBtn.style.display = 'block';
        status.innerText = "Previous recording deleted. Ready to try again.";
    };

    sendBtn.onclick = async () => {
        sendBtn.disabled = true;
        redoBtn.style.display = 'none';
        status.innerText = "Uploading to the Link...";
        
        try {
            const fileName = `line_${Date.now()}.webm`;
            const storageRef = ref(storage, 'audios/' + fileName);
            const snapshot = await uploadBytes(storageRef, audioBlob);
            const url = await getDownloadURL(snapshot.ref);
            
            await addDoc(collection(db, "messages"), {
                url: url,
                timestamp: serverTimestamp()
            });

            status.style.color = "#4ade80";
            status.innerText = "Success! Message sent.";
            previewArea.style.display = 'none';
            recordBtn.style.display = 'block';
            sendBtn.disabled = false;
            redoBtn.style.display = 'block';
        } catch (e) {
            status.innerText = "Error uploading. Try again.";
            sendBtn.disabled = false;
        }
    };
</script>
</body>
</html>
