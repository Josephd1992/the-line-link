<script type="module">
    // ... Firebase Init Code ...

    window.finalSubmit = async () => {
        if (!selectedAgency) { alert("Please select who you are first!"); return; }
        const submitBtn = document.getElementById('submitAll');
        submitBtn.disabled = true;

        try {
            for (let i = 1; i <= 2; i++) {
                const note = document.getElementById(`text-${i}`).value.trim();
                const audio = audioBlobs[i];
                if (audio || note !== "") {
                    let url = "";
                    if (audio) {
                        const fileName = `voice_${Date.now()}_${i}.webm`;
                        const storageRef = ref(storage, 'audios/' + fileName);
                        const snapshot = await uploadBytes(storageRef, audio);
                        url = await getDownloadURL(snapshot.ref);
                    }
                    // IMPORTANT: ADDING THE APPROVED: FALSE FLAG
                    await addDoc(collection(db, "messages"), {
                        agency: selectedAgency,
                        prompt: document.querySelector(`#card-${i} .prompt-title`).innerText,
                        audioUrl: url,
                        textNote: note,
                        approved: false, 
                        timestamp: serverTimestamp()
                    });
                }
            }
            alert("Sent! Your message will appear in the gallery after supervisor review.");
            window.location.href = "index.html";
        } catch (e) {
            alert("Error submitting. Try again.");
            submitBtn.disabled = false;
        }
    };
</script>
