<style>
    .pending-card { border: 1px dashed #fbbf24 !important; opacity: 0.8; }
    .admin-actions { display: flex; gap: 10px; margin-top: 10px; }
    .btn-approve { background: #22c55e; color: white; padding: 5px 10px; border-radius: 5px; border: none; font-size: 0.7rem; cursor: pointer; }
    .btn-delete { background: #ef4444; color: white; padding: 5px 10px; border-radius: 5px; border: none; font-size: 0.7rem; cursor: pointer; }
</style>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ... Firebase Config ...
    const SUPERVISOR_KEY = "1033"; 

    // Check if we are in admin mode via the secret URL link
    const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';

    async function loadGallery() {
        const q = query(collection(db, "messages"), orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);
        const all = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        const list = document.getElementById('messageList');
        list.innerHTML = '';

        all.forEach(msg => {
            // Logic: If not admin, only show approved. If admin, show all.
            if (!isAdmin && !msg.approved) return;

            const card = document.createElement('div');
            card.className = `message-card ${!msg.approved ? 'pending-card' : ''}`;
            card.innerHTML = `
                <div class="card-header">
                    <span>${msg.agency} ${!msg.approved ? '(PENDING)' : ''}</span>
                </div>
                <div class="prompt-preview">${msg.prompt}</div>
                <div class="card-content" style="display:none;">
                    ${msg.audioUrl ? `<audio controls src="${msg.audioUrl}"></audio>` : ''}
                    <p>${msg.textNote}</p>
                    ${isAdmin ? `
                        <div class="admin-actions">
                            <button class="btn-approve" onclick="manage('${msg.id}', 'approve')">APPROVE</button>
                            <button class="btn-delete" onclick="manage('${msg.id}', 'delete')">DELETE</button>
                        </div>
                    ` : ''}
                </div>
            `;
            card.onclick = (e) => {
                if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'AUDIO') {
                    const c = card.querySelector('.card-content');
                    c.style.display = c.style.display === 'none' ? 'block' : 'none';
                }
            };
            list.appendChild(card);
        });
    }

    window.manage = async (id, action) => {
        const pin = prompt("Enter Supervisor PIN:");
        if (pin !== SUPERVISOR_KEY) return alert("Wrong PIN");

        if (action === 'approve') {
            await updateDoc(doc(db, "messages", id), { approved: true });
        } else {
            await deleteDoc(doc(db, "messages", id));
        }
        location.reload();
    };

    loadGallery();
</script>
