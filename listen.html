<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gold Line Link - Gallery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000000; color: white; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; }
        h1 { color: #fbbf24; text-align: center; margin-bottom: 5px; }
        .sub-text { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }

        #messageList { display: flex; flex-direction: column; gap: 20px; }
        .message-card { background: #111111; border: 1px solid #334155; border-radius: 16px; padding: 20px; position: relative; overflow: hidden; }
        
        /* Agency Stripes with White for EMS */
        .agency-stripe { position: absolute; top: 0; left: 0; width: 6px; height: 100%; }
        .stripe-LEO { background: #3b82f6; }
        .stripe-FIRE { background: #ef4444; }
        .stripe-EMS { background: #ffffff; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .agency-label { font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; }
        .LEO-text { color: #3b82f6; }
        .FIRE-text { color: #ef4444; }
        .EMS-text { color: #ffffff; }

        .prompt-info { color: #fbbf24; font-size: 0.85rem; font-style: italic; margin-bottom: 10px; line-height: 1.3; }
        .timestamp { color: #475569; font-size: 0.75rem; }

        .audio-player { width: 100%; margin-top: 15px; border-radius: 8px; }
        .text-note { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 1rem; line-height: 1.5; color: #e2e8f0; border: 1px solid #334155; }

        #status { text-align: center; margin-top: 20px; color: #fbbf24; }
    </style>
</head>
<body>

<div class="container">
    <h1>Appreciation Gallery</h1>
    <p class="sub-text">Messages from the field to the Gold Line.</p>
    
    <div id="status">Loading the Link...</div>
    <div id="messageList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4-eypucZ9FjS4sk4CQgkeNMPyyh4HvcU",
        authDomain: "the-line-link.firebaseapp.com",
        projectId: "the-line-link",
        storageBucket: "the-line-link.firebasestorage.app",
        messagingSenderId: "378236622341",
        appId: "1:378236622341:web:6809e3cd491a7e945b2e6c",
        measurementId: "G-KHPWDYHQRF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadGallery() {
        const messageList = document.getElementById('messageList');
        const status = document.getElementById('status');

        try {
            const q = query(collection(db, "messages"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            
            status.style.display = 'none';
            messageList.innerHTML = '';

            if (querySnapshot.empty) {
                status.style.display = 'block';
                status.innerText = "The gallery is waiting for the first message of the week.";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const timeStr = data.timestamp ? data.timestamp.toDate().toLocaleString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'}) : "Just now";
                
                const card = document.createElement('div');
                card.className = 'message-card';
                
                card.innerHTML = `
                    <div class="agency-stripe stripe-${data.agency}"></div>
                    <div class="card-header">
                        <span class="agency-label ${data.agency}-text">${data.agency}</span>
                        <span class="timestamp">${timeStr}</span>
                    </div>
                    <div class="prompt-info">"${data.prompt}"</div>
                    ${data.audioUrl ? `<audio controls class="audio-player" src="${data.audioUrl}"></audio>` : ''}
                    ${data.textNote ? `<div class="text-note">${data.textNote}</div>` : ''}
                `;
                messageList.appendChild(card);
            });
        } catch (e) {
            console.error(e);
            status.innerText = "Error loading gallery. Please refresh.";
        }
    }

    loadGallery();
</script>
</body>
</html>
